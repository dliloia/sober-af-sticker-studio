<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#232F3E"/>
      <stop offset="100%" stop-color="#37475A"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1100" height="720" rx="12" fill="#F8F9FA"/>

  <!-- title bar -->
  <rect width="1100" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect y="40" width="1100" height="12" fill="url(#headerGrad)"/>
  <text x="550" y="33" text-anchor="middle" fill="#FF9900" font-size="18" font-weight="700">SoberAF Sticker Studio — Architecture</text>

  <!-- ===== ROW 1: User + Frontend + API GW ===== -->

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="40" y="90" width="120" height="56" rx="8" fill="#fff" stroke="#545B64" stroke-width="1.5"/>
    <text x="100" y="115" text-anchor="middle" font-size="12" font-weight="600" fill="#232F3E">User</text>
    <text x="100" y="132" text-anchor="middle" font-size="10" fill="#545B64">Browser</text>
  </g>

  <!-- arrow User -> Frontend -->
  <line x1="160" y1="118" x2="210" y2="118" stroke="#545B64" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Frontend S3 -->
  <g filter="url(#shadow)">
    <rect x="210" y="90" width="150" height="56" rx="8" fill="#3F8624" stroke="#3F8624" stroke-width="1.5"/>
    <text x="285" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Amazon S3</text>
    <text x="285" y="130" text-anchor="middle" font-size="10" fill="#E8F5E2">Static Website</text>
  </g>

  <!-- arrow Frontend -> API GW -->
  <line x1="360" y1="118" x2="420" y2="118" stroke="#545B64" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- API Gateway -->
  <g filter="url(#shadow)">
    <rect x="420" y="90" width="160" height="56" rx="8" fill="#A166FF" stroke="#A166FF" stroke-width="1.5"/>
    <text x="500" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">API Gateway</text>
    <text x="500" y="130" text-anchor="middle" font-size="10" fill="#E8DAFF">REST API</text>
  </g>

  <!-- ===== ROW 2: Three Lambda endpoints ===== -->

  <!-- arrow API GW -> Generate -->
  <line x1="460" y1="146" x2="460" y2="200" stroke="#545B64" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <!-- arrow API GW -> ListDesigns -->
  <line x1="500" y1="146" x2="680" y2="200" stroke="#545B64" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <!-- arrow API GW -> Delete -->
  <line x1="540" y1="146" x2="880" y2="200" stroke="#545B64" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Generate Lambda -->
  <g filter="url(#shadow)">
    <rect x="370" y="200" width="170" height="64" rx="8" fill="#FF9900" stroke="#FF9900" stroke-width="1.5"/>
    <text x="455" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#232F3E">Lambda</text>
    <text x="455" y="243" text-anchor="middle" font-size="10" fill="#232F3E">Generate</text>
    <text x="455" y="256" text-anchor="middle" font-size="9" fill="#593D00">POST /generate</text>
  </g>

  <!-- ListDesigns Lambda -->
  <g filter="url(#shadow)">
    <rect x="600" y="200" width="170" height="64" rx="8" fill="#FF9900" stroke="#FF9900" stroke-width="1.5"/>
    <text x="685" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#232F3E">Lambda</text>
    <text x="685" y="243" text-anchor="middle" font-size="10" fill="#232F3E">ListDesigns</text>
    <text x="685" y="256" text-anchor="middle" font-size="9" fill="#593D00">GET /designs</text>
  </g>

  <!-- Delete Lambda -->
  <g filter="url(#shadow)">
    <rect x="810" y="200" width="170" height="64" rx="8" fill="#FF9900" stroke="#FF9900" stroke-width="1.5"/>
    <text x="895" y="225" text-anchor="middle" font-size="11" font-weight="700" fill="#232F3E">Lambda</text>
    <text x="895" y="243" text-anchor="middle" font-size="10" fill="#232F3E">Delete</text>
    <text x="895" y="256" text-anchor="middle" font-size="9" fill="#593D00">DELETE /designs/id</text>
  </g>

  <!-- ===== EXTERNAL: OpenAI ===== -->
  <g filter="url(#shadow)">
    <rect x="100" y="200" width="170" height="56" rx="8" fill="#10A37F" stroke="#10A37F" stroke-width="1.5"/>
    <text x="185" y="223" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">OpenAI API</text>
    <text x="185" y="240" text-anchor="middle" font-size="10" fill="#C8F7E8">gpt-image-1</text>
  </g>

  <!-- arrow Generate -> OpenAI -->
  <line x1="370" y1="232" x2="270" y2="228" stroke="#10A37F" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- ===== ROW 3: Raw S3 Bucket ===== -->

  <!-- arrow Generate -> Raw Bucket -->
  <line x1="455" y1="264" x2="455" y2="330" stroke="#545B64" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="465" y="300" font-size="9" fill="#545B64">PutObject</text>

  <!-- Raw S3 Bucket -->
  <g filter="url(#shadow)">
    <rect x="370" y="330" width="170" height="56" rx="8" fill="#3F8624" stroke="#3F8624" stroke-width="1.5"/>
    <text x="455" y="353" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Amazon S3</text>
    <text x="455" y="370" text-anchor="middle" font-size="10" fill="#E8F5E2">Raw Bucket (private)</text>
  </g>

  <!-- ===== S3 Event Trigger ===== -->

  <!-- arrow Raw Bucket -> Process Lambda (S3 event) -->
  <line x1="455" y1="386" x2="455" y2="450" stroke="#D13212" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="465" y="425" font-size="9" fill="#D13212">S3 Event Trigger</text>

  <!-- Process Lambda (container) -->
  <g filter="url(#shadow)">
    <rect x="340" y="450" width="230" height="72" rx="8" fill="#FF9900" stroke="#D13212" stroke-width="2.5"/>
    <text x="455" y="473" text-anchor="middle" font-size="11" font-weight="700" fill="#232F3E">Lambda (Container Image)</text>
    <text x="455" y="490" text-anchor="middle" font-size="10" fill="#232F3E">Process</text>
    <text x="455" y="506" text-anchor="middle" font-size="9" fill="#593D00">@imgly/background-removal + sharp</text>
  </g>

  <!-- ECR label -->
  <g filter="url(#shadow)">
    <rect x="100" y="460" width="160" height="50" rx="8" fill="#C7131A" stroke="#C7131A" stroke-width="1.5"/>
    <text x="180" y="483" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Amazon ECR</text>
    <text x="180" y="498" text-anchor="middle" font-size="10" fill="#FDD" >Container Registry</text>
  </g>

  <!-- arrow ECR -> Process -->
  <line x1="260" y1="485" x2="340" y2="485" stroke="#C7131A" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>

  <!-- ===== ROW 5: Processed Bucket ===== -->

  <!-- arrow Process -> Processed Bucket -->
  <line x1="455" y1="522" x2="455" y2="580" stroke="#545B64" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="465" y="555" font-size="9" fill="#545B64">PutObject (3 sizes)</text>

  <!-- Processed S3 Bucket -->
  <g filter="url(#shadow)">
    <rect x="370" y="580" width="170" height="56" rx="8" fill="#3F8624" stroke="#3F8624" stroke-width="1.5"/>
    <text x="455" y="603" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Amazon S3</text>
    <text x="455" y="620" text-anchor="middle" font-size="10" fill="#E8F5E2">Processed Bucket (public)</text>
  </g>

  <!-- ===== DynamoDB (center right) ===== -->
  <g filter="url(#shadow)">
    <rect x="700" y="370" width="170" height="56" rx="8" fill="#2D72D9" stroke="#2D72D9" stroke-width="1.5"/>
    <text x="785" y="393" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Amazon DynamoDB</text>
    <text x="785" y="410" text-anchor="middle" font-size="10" fill="#D4E4FA">Metadata Table</text>
  </g>

  <!-- arrows to DynamoDB -->
  <!-- Generate -> DynamoDB (PutItem) -->
  <line x1="540" y1="248" x2="700" y2="380" stroke="#2D72D9" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

  <!-- Process -> DynamoDB (UpdateItem) -->
  <line x1="570" y1="486" x2="700" y2="405" stroke="#2D72D9" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

  <!-- ListDesigns -> DynamoDB (Scan) -->
  <line x1="685" y1="264" x2="785" y2="370" stroke="#2D72D9" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

  <!-- Delete -> DynamoDB -->
  <line x1="895" y1="264" x2="830" y2="370" stroke="#2D72D9" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

  <!-- Delete -> Raw Bucket -->
  <path d="M 810 248 Q 610 310 540 350" fill="none" stroke="#D13212" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>

  <!-- Delete -> Processed Bucket -->
  <path d="M 810 256 Q 620 500 540 600" fill="none" stroke="#D13212" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>

  <!-- ===== CloudWatch (bottom right) ===== -->
  <g filter="url(#shadow)">
    <rect x="750" y="530" width="170" height="56" rx="8" fill="#CC2264" stroke="#CC2264" stroke-width="1.5"/>
    <text x="835" y="553" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">CloudWatch</text>
    <text x="835" y="570" text-anchor="middle" font-size="10" fill="#FFD4E8">Logs + Alarms</text>
  </g>

  <!-- ===== CloudFormation (bottom right) ===== -->
  <g filter="url(#shadow)">
    <rect x="750" y="610" width="170" height="56" rx="8" fill="#E7157B" stroke="#E7157B" stroke-width="1.5"/>
    <text x="835" y="633" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">CloudFormation</text>
    <text x="835" y="650" text-anchor="middle" font-size="10" fill="#FFD4E8">SAM (IaC)</text>
  </g>

  <!-- ===== IAM (bottom far right) ===== -->
  <g filter="url(#shadow)">
    <rect x="950" y="470" width="120" height="56" rx="8" fill="#DD344C" stroke="#DD344C" stroke-width="1.5"/>
    <text x="1010" y="493" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">AWS IAM</text>
    <text x="1010" y="510" text-anchor="middle" font-size="10" fill="#FFD4E8">4 Roles</text>
  </g>

  <!-- ===== Legend ===== -->
  <rect x="30" y="650" width="340" height="55" rx="6" fill="#fff" stroke="#DDD" stroke-width="1"/>
  <text x="45" y="670" font-size="10" font-weight="600" fill="#232F3E">Legend:</text>
  <rect x="45" y="680" width="14" height="10" rx="2" fill="#FF9900"/>
  <text x="64" y="689" font-size="9" fill="#545B64">Lambda</text>
  <rect x="110" y="680" width="14" height="10" rx="2" fill="#3F8624"/>
  <text x="129" y="689" font-size="9" fill="#545B64">S3</text>
  <rect x="155" y="680" width="14" height="10" rx="2" fill="#2D72D9"/>
  <text x="174" y="689" font-size="9" fill="#545B64">DynamoDB</text>
  <rect x="235" y="680" width="14" height="10" rx="2" fill="#A166FF"/>
  <text x="254" y="689" font-size="9" fill="#545B64">API GW</text>
  <rect x="300" y="680" width="14" height="10" rx="2" fill="#10A37F"/>
  <text x="319" y="689" font-size="9" fill="#545B64">External</text>

  <!-- ===== Arrowhead markers ===== -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#545B64"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10A37F"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#D13212"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2D72D9"/>
    </marker>
  </defs>
</svg>
